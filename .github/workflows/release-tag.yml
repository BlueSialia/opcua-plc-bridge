name: Release tag

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create release and attach binary
    if: "startsWith(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release -p runtime

      - name: Get version
        id: version
        run: |
          cargo metadata --format-version 1 --no-deps > meta.json
          VERSION=$(jq -r '.packages[] | select(.name == "runtime") | .version' meta.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Generate release notes
        run: |
          awk '/^## \[/{count++} count==1' CHANGELOG.md > release-notes.md
          echo "--- Release notes ---"
          cat release-notes.md

      - name: Create release and upload binary
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: release-notes.md
          files: target/release/opcua-plc-bridge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/opcua-plc-bridge
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ steps.version.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
