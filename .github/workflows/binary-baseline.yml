name: Update binary baseline

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  update:
    name: Update baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Measure compilation time
        run: |
          /usr/bin/time -f '%e' -o compile-time.txt cargo build --release
          echo "Compilation time (real seconds): $(cat compile-time.txt)"

      - name: Record binary sizes
        run: |
          find target/release -maxdepth 1 -type f -executable \
            -exec stat --format='%n %s' {} \; \
            | sort \
            | jq -R 'split(" ") | {(.[0] | split("/")[-1]): (.[1] | tonumber)}' \
            | jq -s add > sizes.json

      - name: Save baseline
        run: |
          jq -n \
            --argjson binaries "$(cat sizes.json)" \
            --arg time "$(cat compile-time.txt)" \
            '{ binaries: $binaries, compile_time_real: $time | tonumber }' \
            > baseline.json
          echo "Baseline:"
          cat baseline.json

      - name: Save baseline to cache
        uses: actions/cache/save@v5
        with:
          path: baseline.json
          key: binary-baseline-${{ github.run_id }}
